# Docker Compose for ERP System - Phase 5
# Run: docker-compose up --build

version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: erp_db
    environment:
      POSTGRES_DB: erp_system
      POSTGRES_USER: erp_user
      POSTGRES_PASSWORD: erp_password_2024
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U erp_user -d erp_system"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Django Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: erp_backend
    command: >
      sh -c "
        python manage.py migrate &&
        python manage.py create_admin &&
        python manage.py seed_products &&
        python manage.py seed_sales &&
        python manage.py seed_accounts &&
        python manage.py seed_hr &&
        gunicorn core.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 120
      "
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      - DEBUG=True
      - SECRET_KEY=django-insecure-erp-docker-change-in-production-x9k2m
      - DB_ENGINE=django.db.backends.postgresql
      - DB_NAME=erp_system
      - DB_USER=erp_user
      - DB_PASSWORD=erp_password_2024
      - DB_HOST=db
      - DB_PORT=5432
      - DJANGO_ALLOWED_HOSTS=localhost,127.0.0.1,backend,frontend
      - CORS_ALLOWED_ORIGINS=http://localhost,http://localhost:5173,http://localhost:3000
      # Email Configuration (SMTP)
      - EMAIL_BACKEND=django.core.mail.backends.smtp.EmailBackend
      - EMAIL_HOST=smtp.gmail.com
      - EMAIL_PORT=587
      - EMAIL_USE_TLS=True
      - EMAIL_HOST_USER=${EMAIL_HOST_USER:-}
      - EMAIL_HOST_PASSWORD=${EMAIL_HOST_PASSWORD:-}
      - DEFAULT_FROM_EMAIL=RIADAH ERP <noreply@riadah.com>
    depends_on:
      db:
        condition: service_healthy

  # React Frontend (Nginx)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: erp_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
